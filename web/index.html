<!DOCTYPE html>
<html lang="en">
<head>
  <title>Fortuna</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#4CAF50">

  <link rel="stylesheet" href="style.css">
  <script src="jquery-3.7.1.min.js"></script>
</head>

<body>

<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <defs>
    <symbol id="ic_verbum" viewBox="0 0 24 24">
      <path
          d="M22,2L2.01,2L2,22l4,-4h16L22,2zM6,9h12v2L6,11L6,9zM14,14L6,14v-2h8v2zM18,8L6,8L6,6h12v2z"
          style="fill: #FFF;"/>
    </symbol>
  </defs>
</svg>

<aside>
  <nav id="nav-year"></nav>
  <nav id="nav-month"></nav>
</aside>

<main>
  <section id="grid"></section>
  <article id="panel">
    <header>
      <p>
        <span></span>
        <span></span>
      </p>
      <hr>
    </header>
    <div id="panelTop">
      <input id="emoji" type="text" title="An emoji for this day/month" disabled>
      <ul id="score">
        <li>3.0</li>
        <li>2.5</li>
        <li>2.0</li>
        <li>1.5</li>
        <li>1.0</li>
        <li>0.5</li>
        <li>0</li>
        <li>-0.5</li>
        <li>-1.0</li>
        <li>-1.5</li>
        <li>-2.0</li>
        <li>-2.5</li>
        <li>-3.0</li>
      </ul>
      <!--<div id="scoreCover"></div>-->
    </div>
    <textarea id="verbum" name="verbum" disabled></textarea>
    <footer>
      <button id="save" title="Saves the current data in Vita."
          disabled>Save</button>
      <button id="reset" title="Reloads unchanged data from Vita."
          disabled>Refresh</button>
      <button id="clear" title="Removes all data about this day/month-default from Vita."
          disabled>Clear</button>
    </footer>
  </article>
</main>

<script src="script.js"></script>
</body>
</html>
